<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Annie X Music</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--s1:#121212;--s2:#181818;--s3:#282828;--s4:#333;
  --acc:#a855f7;--acc2:#7c3aed;--green:#1db954;--pink:#ec4899;
  --text:#fff;--text2:#b3b3b3;--text3:#6b6b6b;--border:rgba(255,255,255,0.08);
  --nav-h:68px;--mini-h:68px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
img{display:block}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden}
.views{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:none;padding-bottom:calc(var(--mini-h) + var(--nav-h) + var(--safe-b))}
.view::-webkit-scrollbar{display:none}
.view.active{display:block}

/* ── Bottom Nav ── */
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);display:flex;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);z-index:40;backdrop-filter:blur(20px)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:8px 0;transition:color 0.15s;-webkit-tap-highlight-color:transparent}
.bnav-btn svg{width:22px;height:22px;fill:currentColor;transition:transform 0.15s}
.bnav-btn.active{color:var(--acc)}
.bnav-btn.active svg{transform:scale(1.12)}

/* ── Mini Player ── */
.mini{position:absolute;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;height:var(--mini-h);background:var(--s3);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;cursor:pointer;z-index:39;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.mini.show{transform:translateY(0)}
.mini-art{width:44px;height:44px;border-radius:6px;background:var(--s4);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px}
.mini-art img{width:100%;height:100%;object-fit:cover}
.mini-info{flex:1;min-width:0}
.mini-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-artist{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-prog{position:absolute;top:0;left:0;height:2px;background:var(--acc);transition:width 1s linear}
.mini-btn{width:36px;height:36px;border-radius:50%;border:none;background:none;color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Song Overlay ── */
.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);will-change:transform}
.overlay.open{transform:translateY(0)}
.ov-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:10px auto 0}
.ov-head{display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0}
.ov-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.ov-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ov-art-wrap{padding:28px 32px 20px;flex-shrink:0}
.ov-art{width:100%;aspect-ratio:1;border-radius:16px;background:var(--s3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:64px;box-shadow:0 16px 60px rgba(0,0,0,0.8)}
.ov-art img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.ov-art.playing{animation:artPulse 3s ease-in-out infinite}
@keyframes artPulse{0%,100%{box-shadow:0 16px 60px rgba(0,0,0,0.8),0 0 0 0 rgba(168,85,247,0)}50%{box-shadow:0 16px 60px rgba(0,0,0,0.8),0 0 0 12px rgba(168,85,247,0.12)}}
.ov-body{padding:0 28px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.ov-meta{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.ov-title{font-size:20px;font-weight:800;letter-spacing:-0.3px;line-height:1.2;max-height:2.5em;overflow:hidden}
.ov-artist{font-size:14px;color:var(--text2);margin-top:5px}
.ov-like{width:38px;height:38px;border-radius:50%;border:none;background:none;font-size:24px;cursor:pointer;flex-shrink:0;margin-top:4px;opacity:0.7;transition:all 0.15s}
.ov-like.liked{opacity:1;filter:drop-shadow(0 0 8px rgba(236,72,153,0.7))}
.ov-prog-wrap{margin-bottom:8px}
.ov-prog{width:100%;height:4px;background:var(--s3);border-radius:2px;cursor:pointer;position:relative;-webkit-appearance:none;appearance:none;outline:none}
.ov-prog::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);margin-top:-5px;cursor:pointer}
.ov-prog::-webkit-slider-runnable-track{height:4px;background:linear-gradient(to right,var(--acc) var(--prog,0%),var(--s3) var(--prog,0%));border-radius:2px}
.ov-times{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:24px}
.ov-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.ov-ctrl-btn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.ov-ctrl-btn svg{width:22px;height:22px;fill:currentColor}
.ov-play-btn{width:60px;height:60px;border-radius:50%;background:var(--text);border:none;color:var(--bg);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,255,255,0.15);transition:transform 0.1s,box-shadow 0.1s}
.ov-play-btn:active{transform:scale(0.94)}
.ov-actions{display:flex;justify-content:space-around;padding-bottom:20px}
.ov-action{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif}
.ov-action svg{width:24px;height:24px;fill:currentColor}
.ov-action.active{color:var(--acc)}

/* ── Header ── */
.view-head{padding:52px 18px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.view-head-title{font-size:26px;font-weight:900;letter-spacing:-0.3px}
.view-head-sub{font-size:13px;color:var(--text2)}

/* ── Category Pills ── */
.pills{display:flex;gap:8px;overflow-x:auto;padding:0 18px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 18px;border-radius:100px;font-size:13px;font-weight:700;background:var(--s2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;border:none;font-family:'Inter',sans-serif}
.pill:hover{background:var(--s3)}
.pill.on{background:var(--text);color:var(--bg)}

/* ── Song Cards ── */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:12px}
.section-title{font-size:18px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 18px 4px}
.card{background:var(--s2);border-radius:10px;padding:12px;cursor:pointer;transition:background 0.15s;position:relative;overflow:hidden}
.card:hover,.card:active{background:var(--s3)}
.card-art{width:100%;aspect-ratio:1;border-radius:8px;background:var(--s3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:10px;position:relative}
.card-art img{width:100%;height:100%;object-fit:cover}
.card-play{position:absolute;bottom:6px;right:6px;width:36px;height:36px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 4px 12px rgba(168,85,247,0.5);opacity:0;transform:translateY(6px);transition:all 0.2s}
.card:hover .card-play,.card:active .card-play{opacity:1;transform:translateY(0)}
.card-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-artist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-dur{font-size:10px;color:var(--text3);margin-top:4px}

/* ── Search ── */
.search-sticky{position:sticky;top:0;z-index:10;background:var(--bg);padding:52px 18px 14px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:10px;padding:12px 16px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif}
.search-box input::placeholder{color:var(--text3)}
.search-ic{font-size:16px;color:var(--text3)}
.result-list{padding:0 18px}
.result-row{display:flex;align-items:center;gap:12px;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.12s}
.result-row:last-child{border-bottom:none}
.result-art{width:46px;height:46px;border-radius:6px;background:var(--s2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.result-art img{width:100%;height:100%;object-fit:cover}
.result-info{flex:1;min-width:0}
.result-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-artist{font-size:11px;color:var(--text2);margin-top:2px}
.result-dur{font-size:11px;color:var(--text3);flex-shrink:0}
.result-dl{width:32px;height:32px;border-radius:50%;border:none;background:var(--s3);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Download ── */
.dl-wrap{padding:52px 18px 0}
.dl-title{font-size:26px;font-weight:900;margin-bottom:6px}
.dl-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.dl-box{display:flex;gap:10px;margin-bottom:20px}
.dl-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.dl-input:focus{border-color:var(--acc)}
.dl-input::placeholder{color:var(--text3)}
.dl-btn{padding:13px 18px;border-radius:10px;background:var(--acc);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.dl-btn:disabled{opacity:0.5;cursor:default}
.dl-result{background:var(--s2);border-radius:12px;padding:16px;display:flex;gap:12px;align-items:center}
.dl-result-art{width:60px;height:60px;border-radius:8px;background:var(--s3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.dl-result-art img{width:100%;height:100%;object-fit:cover}
.dl-result-info{flex:1;min-width:0}
.dl-result-title{font-size:14px;font-weight:700;margin-bottom:3px}
.dl-result-artist{font-size:12px;color:var(--text2)}
.dl-result-dur{font-size:11px;color:var(--text3);margin-top:3px}
.dl-result-btn{padding:10px 16px;border-radius:8px;background:var(--acc);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.dl-result-btn:disabled{opacity:0.5}

/* ── Profile ── */
.profile-wrap{padding:52px 18px 0}
.profile-hero{background:linear-gradient(160deg,rgba(120,40,200,0.4) 0%,rgba(13,13,20,0) 70%);border-radius:20px;padding:28px;margin-bottom:20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(168,85,247,0.15) 0%,transparent 70%);pointer-events:none}
.profile-avatar{width:88px;height:88px;border-radius:50%;background:var(--s3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid rgba(168,85,247,0.4);position:relative;flex-shrink:0}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:24px;font-weight:900;letter-spacing:-0.3px}
.profile-username{font-size:14px;color:var(--acc);font-weight:700}
.profile-premium{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#9333ea,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding:3px 0}
.profile-no-tg{color:var(--text2);font-size:13px;line-height:1.6}
.profile-section{background:var(--s2);border-radius:14px;padding:18px;margin-bottom:14px}
.profile-section-title{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.profile-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-row-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.profile-row-text{flex:1}
.profile-row-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.profile-row-val{font-size:14px;font-weight:600}
.bot-feature{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.bot-feat-badge{padding:5px 12px;border-radius:100px;background:var(--s3);font-size:11px;font-weight:700;color:var(--text2)}

/* ── Empty / Loading ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text3)}
.empty-icon{font-size:52px;opacity:0.4}
.empty-text{font-size:14px;font-weight:600}
.empty-sub{font-size:12px;text-align:center;line-height:1.6}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--s2);border-radius:10px;padding:12px}
.skel-thumb{aspect-ratio:1;border-radius:8px;margin-bottom:10px}
.skel-text{height:12px;margin-bottom:6px}
.skel-text-sm{height:10px;width:60%}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--mini-h) + 12px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(12px);background:var(--s3);border:1px solid var(--border);border-radius:100px;padding:10px 22px;font-size:13px;font-weight:600;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.6);transition:all 0.25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Utils ── */
.hidden{display:none!important}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.mt24{margin-top:24px}
</style>
</head>
<body>

<div id="app">
  <div class="views">

    <!-- ══════ HOME ══════ -->
    <div class="view active" id="v-home">
      <div class="view-head">
        <div>
          <div class="view-head-title" id="greetText">Good Evening 🎵</div>
          <div class="view-head-sub">What do you want to listen to?</div>
        </div>
      </div>
      <div class="pills" id="catPills">
        <button class="pill on" onclick="filterCat('all',this)">All</button>
        <button class="pill" onclick="filterCat('Hindi',this)">🎵 Hindi</button>
        <button class="pill" onclick="filterCat('Punjabi',this)">🎶 Punjabi</button>
        <button class="pill" onclick="filterCat('Bollywood',this)">🎬 Bollywood</button>
        <button class="pill" onclick="filterCat('International',this)">🌍 International</button>
      </div>
      <div class="section-head">
        <div class="section-title" id="sectionTitle">Trending Now</div>
      </div>
      <div class="grid" id="songGrid">
        <!-- Skeletons -->
        <div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-text"></div><div class="skel skel-text-sm"></div></div>
        <div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-text"></div><div class="skel skel-text-sm"></div></div>
        <div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-text"></div><div class="skel skel-text-sm"></div></div>
        <div class="skel-card"><div class="skel skel-thumb"></div><div class="skel skel-text"></div><div class="skel skel-text-sm"></div></div>
      </div>
    </div>

    <!-- ══════ SEARCH ══════ -->
    <div class="view" id="v-search">
      <div class="search-sticky">
        <div class="search-box">
          <span class="search-ic">🔍</span>
          <input id="searchInput" type="search" placeholder="Songs, artists, playlists..." autocomplete="off" oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter')doSearch(this.value)"/>
        </div>
      </div>
      <div id="searchResults">
        <div class="empty">
          <div class="empty-icon">🎵</div>
          <div class="empty-text">Find your music</div>
          <div class="empty-sub">Search for songs, artists or<br/>anything you're in the mood for</div>
        </div>
      </div>
    </div>

    <!-- ══════ DOWNLOAD ══════ -->
    <div class="view" id="v-download">
      <div class="dl-wrap">
        <div class="dl-title">Download</div>
        <div class="dl-sub">Search and download any song as audio</div>
        <div class="dl-box">
          <input class="dl-input" id="dlInput" type="text" placeholder="Song name or YouTube URL..." onkeydown="if(event.key==='Enter')dlSearch()"/>
          <button class="dl-btn" id="dlSearchBtn" onclick="dlSearch()">Search</button>
        </div>
        <div id="dlResults"></div>
      </div>
    </div>

  </div><!-- /views -->

  <!-- Mini Player -->
  <div class="mini" id="miniPlayer" onclick="openOverlay()">
    <div class="mini-prog" id="miniProg" style="width:0%"></div>
    <div class="mini-art" id="miniArt">🎵</div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">Nothing playing</div>
      <div class="mini-artist" id="miniArtist">Tap a song to play</div>
    </div>
    <button class="mini-btn" id="miniPlayBtn" onclick="event.stopPropagation();togglePlay()">▶</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bnav">
    <button class="bnav-btn active" id="bn-home" onclick="navTo('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </button>
    <button class="bnav-btn" id="bn-search" onclick="navTo('search')">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Search
    </button>
    <button class="bnav-btn" id="bn-download" onclick="navTo('download')">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
      Download
    </button>
  </nav>
</div>

<!-- ══════ SONG OVERLAY ══════ -->
<div class="overlay" id="songOverlay">
  <div class="ov-handle"></div>
  <div class="ov-head">
    <span class="ov-label">Now Playing</span>
    <button class="ov-close" onclick="closeOverlay()">╲╱</button>
  </div>

  <div class="ov-art-wrap">
    <div class="ov-art" id="ovArt">🎵
      <img id="ovArtImg" src="" alt="" style="display:none" onerror="this.style.display='none'"/>
    </div>
  </div>

  <div class="ov-body">
    <div class="ov-meta">
      <div>
        <div class="ov-title" id="ovTitle">—</div>
        <div class="ov-artist" id="ovArtist">—</div>
      </div>
      <button class="ov-like" id="ovLike" onclick="toggleLike()">🤍</button>
    </div>

    <div class="ov-prog-wrap">
      <input type="range" class="ov-prog" id="ovProg" min="0" max="100" value="0"
             oninput="seekTo(this.value)" style="--prog:0%"/>
    </div>
    <div class="ov-times">
      <span id="ovPlayed">0:00</span>
      <span id="ovTotal">0:00</span>
    </div>

    <div class="ov-controls">
      <button class="ov-ctrl-btn" onclick="prevSong()" title="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ov-play-btn" id="ovPlayBtn" onclick="togglePlay()">▶</button>
      <button class="ov-ctrl-btn" onclick="nextSong()" title="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div class="ov-actions">
      <button class="ov-action" onclick="downloadCurrent()" id="ovDlBtn">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
        Download
      </button>
      <button class="ov-action" id="ovRepeatBtn" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        Repeat
      </button>
      <button class="ov-action" id="ovShareBtn" onclick="shareSong()">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        Share
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<audio id="aud" preload="none"></audio>

<script>
// ── Telegram WebApp Init ──────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor?.('#000000'); tg.setBackgroundColor?.('#000000'); }

// ── Greeting ──────────────────────────────────────────────────
(function(){const h=new Date().getHours(),el=document.getElementById('greetText');el.textContent=h<5?'🌙 Late Night 🎵':h<12?'🌅 Good Morning 🎵':h<18?'☀️ Good Afternoon 🎵':h<22?'🌆 Good Evening 🎵':'🌙 Good Night 🎵'})();

// ── State ─────────────────────────────────────────────────────
const aud = document.getElementById('aud');
let allSongs = [], curCat = 'all', curTrack = null, playing = false;
let history = [], histIdx = -1, likedSet = new Set(), repeatOn = false;
let progTimer = null;

// ── Navigation ────────────────────────────────────────────────
const views = {home:'v-home',search:'v-search',download:'v-download'};
let curView = 'home';
function navTo(name) {
  document.getElementById('v-'+curView).classList.remove('active');
  document.getElementById('bn-'+curView)?.classList.remove('active');
  curView = name;
  document.getElementById('v-'+name).classList.add('active');
  document.getElementById('bn-'+name)?.classList.add('active');
}

// ── Toast ─────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, dur=2400) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ── Format time ───────────────────────────────────────────────
function fmt(s) {
  s = Math.floor(s||0);
  return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');
}

// ── Trending ─────────────────────────────────────────────────
async function loadTrending() {
  try {
    const r = await fetch('/api/trending');
    const d = await r.json();
    allSongs = d.songs || [];
    renderGrid(allSongs);
  } catch { renderGrid([]); }
}
loadTrending();

function filterCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  const filtered = cat === 'all' ? allSongs : allSongs.filter(s => s.category === cat);
  document.getElementById('sectionTitle').textContent = cat === 'all' ? 'Trending Now' : cat + ' Hits';
  renderGrid(filtered);
}

function renderGrid(songs) {
  const g = document.getElementById('songGrid');
  if (!songs.length) {
    g.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🎵</div><div class="empty-text">No songs found</div></div>';
    return;
  }
  g.innerHTML = songs.map((s,i) => `
    <div class="card" onclick='playSong(${JSON.stringify(s)})'>
      <div class="card-art">
        <img src="${s.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>
        <div class="card-play">▶</div>
      </div>
      <div class="card-title">${esc(s.title)}</div>
      <div class="card-artist">${esc(s.channel||'')}</div>
      <div class="card-dur">${s.duration||''}</div>
    </div>`).join('');
}

// ── Search ────────────────────────────────────────────────────
let _searchTimer;
function onSearchInput(q) {
  clearTimeout(_searchTimer);
  if (!q.trim()) {
    document.getElementById('searchResults').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Find your music</div></div>`;
    return;
  }
  _searchTimer = setTimeout(() => doSearch(q), 480);
}
async function doSearch(q) {
  if (!q.trim()) return;
  const el = document.getElementById('searchResults');
  el.innerHTML = `<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Searching...</div></div>`;
  try {
    const r = await fetch('/api/search?q='+encodeURIComponent(q));
    const d = await r.json();
    const results = d.results || [];
    if (!results.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">😕</div><div class="empty-text">No results</div><div class="empty-sub">Try different keywords</div></div>`;
      return;
    }
    el.innerHTML = `<div class="result-list">${results.map(s=>`
      <div class="result-row" onclick='playSong(${JSON.stringify(s)})'>
        <div class="result-art"><img src="${s.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/></div>
        <div class="result-info">
          <div class="result-title">${esc(s.title)}</div>
          <div class="result-artist">${esc(s.channel||'')}</div>
        </div>
        <span class="result-dur">${s.duration||''}</span>
        <button class="result-dl" title="Download" onclick="event.stopPropagation();dlSong('${s.id}','${esc(s.title)}')">⬇</button>
      </div>`).join('')}</div>`;
  } catch { el.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Search failed</div></div>`; }
}

// ── Download ──────────────────────────────────────────────────
async function dlSearch() {
  const q = document.getElementById('dlInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('dlSearchBtn');
  btn.disabled = true; btn.textContent = '...';
  const res = document.getElementById('dlResults');
  res.innerHTML = '';
  try {
    const r = await fetch('/api/search?q='+encodeURIComponent(q));
    const d = await r.json();
    const results = (d.results||[]).slice(0,6);
    if (!results.length) { res.innerHTML = '<div class="empty"><div class="empty-icon">😕</div><div class="empty-text">Nothing found</div></div>'; return; }
    res.innerHTML = `<div class="result-list">${results.map(s=>`
      <div class="result-row">
        <div class="result-art"><img src="${s.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/></div>
        <div class="result-info"><div class="result-title">${esc(s.title)}</div><div class="result-artist">${esc(s.channel||'')} · ${s.duration||''}</div></div>
        <button class="result-dl" onclick="dlSong('${s.id}','${esc(s.title)}')">⬇</button>
      </div>`).join('')}</div>`;
  } catch { res.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Failed</div></div>'; }
  finally { btn.disabled = false; btn.textContent = 'Search'; }
}

async function dlSong(vid, title) {
  toast('⬇ Downloading…', 8000);
  try {
    const a = document.createElement('a');
    a.href = '/api/download?v='+vid;
    a.download = (title||vid)+'.m4a';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => toast('✅ Download started!'), 800);
  } catch { toast('❌ Download failed'); }
}

function downloadCurrent() {
  if (!curTrack) return;
  dlSong(curTrack.id, curTrack.title);
}

// ── Profile ───────────────────────────────────────────────────
async function loadProfile() {
  // Telegram user profile
  const tgUser = tg?.initDataUnsafe?.user;
  const heroEl = document.getElementById('profileHero');
  const avatarEl = document.getElementById('profileAvatar');
  const nameEl = document.getElementById('profileName');
  const usernameEl = document.getElementById('profileUsername');

  if (tgUser) {
    nameEl.textContent = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || 'Telegram User';
    usernameEl.textContent = tgUser.username ? '@'+tgUser.username : 'Telegram User';
    if (tgUser.photo_url) {
      avatarEl.innerHTML = `<img src="${tgUser.photo_url}" alt="" onerror="this.parentElement.textContent='👤'"/>`;
    }
    if (tgUser.is_premium) {
      nameEl.insertAdjacentHTML('afterend', '<div class="profile-premium">⭐ Telegram Premium</div>');
    }
  } else {
    nameEl.textContent = 'Annie X Music';
    usernameEl.textContent = 'Open via Telegram Mini App';
    avatarEl.textContent = '🎵';
  }

  // Bot info
  try {
    const r = await fetch('/api/botinfo');
    const d = await r.json();
    document.getElementById('botName').textContent = d.name || '—';
    document.getElementById('botUsername').textContent = d.username ? '@'+d.username : '—';
    document.getElementById('botBio').textContent = d.bio || '—';
    const feats = document.getElementById('botFeatures');
    feats.innerHTML = (d.features||[]).map(f=>`<span class="bot-feat-badge">${f}</span>`).join('');
    if (d.pfp) {
      avatarEl.innerHTML = tgUser
        ? avatarEl.innerHTML
        : `<img src="${d.pfp}" alt="" onerror="this.parentElement.textContent='🎵'"/>`;
    }
  } catch {}
}

// ── Audio Player ──────────────────────────────────────────────
async function playSong(song) {
  curTrack = song;
  // Add to history
  if (!history.length || history[history.length-1].id !== song.id) {
    history.push({...song}); histIdx = history.length-1;
    if (history.length > 50) history.shift();
  } else { histIdx = history.length-1; }

  updateMiniPlayer(song.title, song.channel, song.thumb, 0, 0);
  updateOverlay(song.title, song.channel, song.thumb, 0, 0);
  toast('⏳ Loading…');

  try {
    // Fetch metadata in background
    const metaP = fetch(`/api/stream?v=${song.id}`).then(r=>r.json()).catch(()=>({}));

    // Set src + load + play — all synchronously before any await (preserves user gesture)
    aud.src = `/api/audio?v=${song.id}`;
    aud.load();
    aud.loop = repeatOn;
    aud.play().then(() => {
      playing = true;
      setPlayBtns(true);
      startProgTimer();
    }).catch(() => {
      toast('❌ Could not play. Try again.');
      playing = false; setPlayBtns(false);
    });

    // Update UI with metadata once it arrives
    const meta = await metaP;
    const sec = meta.seconds || 0;
    curTrack = {...song, title: meta.title||song.title, channel: meta.channel||song.channel, thumb: meta.thumb||song.thumb, seconds: sec};
    updateMiniPlayer(curTrack.title, curTrack.channel, curTrack.thumb, 0, sec);
    updateOverlay(curTrack.title, curTrack.channel, curTrack.thumb, 0, sec);
    updateProg(Math.floor(aud.currentTime||0), sec);
    toast('▶ '+curTrack.title.slice(0,38));
  } catch(e) {
    toast('❌ Could not load. Try again.');
    playing = false; setPlayBtns(false);
  }
}

function togglePlay() {
  if (!curTrack) return;
  if (aud.paused) {
    aud.play().then(()=>{ playing=true; setPlayBtns(true); startProgTimer(); }).catch(()=>{});
  } else {
    aud.pause(); playing=false; setPlayBtns(false); clearInterval(progTimer);
  }
}

function toggleRepeat() {
  repeatOn = !repeatOn;
  aud.loop = repeatOn;
  const btn = document.getElementById('ovRepeatBtn');
  btn.classList.toggle('active', repeatOn);
  toast(repeatOn ? '🔁 Repeat On' : '🔁 Repeat Off');
}

function toggleLike() {
  if (!curTrack) return;
  const key = curTrack.id;
  const btn = document.getElementById('ovLike');
  if (likedSet.has(key)) { likedSet.delete(key); btn.textContent='🤍'; btn.classList.remove('liked'); toast('Removed from liked'); }
  else { likedSet.add(key); btn.textContent='❤️'; btn.classList.add('liked'); toast('❤️ Added to liked'); }
}

function prevSong() {
  if (histIdx > 0) { histIdx--; playSong(history[histIdx]); }
  else { aud.currentTime=0; }
}

function nextSong() {
  if (histIdx < history.length-1) { histIdx++; playSong(history[histIdx]); }
  else toast('🎵 No next song');
}

function shareSong() {
  if (!curTrack) return;
  const url = `https://www.youtube.com/watch?v=${curTrack.id}`;
  if (navigator.share) navigator.share({title: curTrack.title, url}).catch(()=>{});
  else { navigator.clipboard?.writeText(url).then(()=>toast('🔗 Link copied')).catch(()=>toast('🔗 '+url)); }
}

function seekTo(val) {
  const dur = curTrack?.seconds || aud.duration || 0;
  if (dur > 0) { aud.currentTime = val/100*dur; }
}

aud.addEventListener('ended', () => { playing=false; setPlayBtns(false); clearInterval(progTimer); updateProg(1,1); });
aud.addEventListener('error', () => { toast('❌ Stream error'); playing=false; setPlayBtns(false); });

function startProgTimer() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    const played = Math.floor(aud.currentTime||0);
    const total = curTrack?.seconds || Math.floor(aud.duration||0) || 0;
    updateProg(played, total);
  }, 1000);
}

function updateProg(played, total) {
  const pct = total>0 ? Math.min(played/total*100,100) : 0;
  const prog = document.getElementById('ovProg');
  prog.value = pct; prog.style.setProperty('--prog', pct+'%');
  document.getElementById('ovPlayed').textContent = fmt(played);
  document.getElementById('ovTotal').textContent = fmt(total);
  document.getElementById('miniProg').style.width = pct+'%';
}

function setPlayBtns(isPlaying) {
  const icon = isPlaying ? '⏸' : '▶';
  document.getElementById('ovPlayBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('miniPlayBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('ovArt').classList.toggle('playing', isPlaying);
}

function updateMiniPlayer(title, artist, thumb, played, total) {
  document.getElementById('miniTitle').textContent = title||'';
  document.getElementById('miniArtist').textContent = artist||'';
  const art = document.getElementById('miniArt');
  if (thumb) art.innerHTML = `<img src="${thumb}" alt="" onerror="this.innerHTML='🎵'"/>`;
  else art.textContent = '🎵';
  document.getElementById('miniPlayer').classList.add('show');
}

function updateOverlay(title, artist, thumb, played, total) {
  document.getElementById('ovTitle').textContent = title||'—';
  document.getElementById('ovArtist').textContent = artist||'';
  const artEl = document.getElementById('ovArt');
  const imgEl = document.getElementById('ovArtImg');
  if (thumb) {
    // Remove text nodes only, keep the img element in DOM
    Array.from(artEl.childNodes).forEach(n => { if (n.nodeType === 3) n.remove(); });
    if (!artEl.contains(imgEl)) artEl.appendChild(imgEl);
    imgEl.src = thumb;
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
    imgEl.src = '';
    Array.from(artEl.childNodes).forEach(n => { if (n.nodeType === 3) n.remove(); });
    if (!artEl.childNodes.length) artEl.textContent = '🎵';
  }
  const liked = curTrack && likedSet.has(curTrack.id);
  document.getElementById('ovLike').textContent = liked?'❤️':'🤍';
  document.getElementById('ovLike').classList.toggle('liked', liked);
}

// ── Overlay ───────────────────────────────────────────────────
function openOverlay() {
  document.getElementById('songOverlay').classList.add('open');
}
function closeOverlay() {
  document.getElementById('songOverlay').classList.remove('open');
}

// Swipe down to close
let touchStartY = 0;
const ov = document.getElementById('songOverlay');
ov.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
ov.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 0) ov.style.transform = `translateY(${dy}px)`;
}, {passive:true});
ov.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  ov.style.transform = '';
  if (dy > 100) closeOverlay();
});

// ── Helpers ───────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>
